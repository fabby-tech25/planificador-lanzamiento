<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planificador de Lanzamiento — Club Geek</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f8f9ff;
      min-height: 100vh;
      padding: 2.5rem 1rem 4rem;
      color: #111;
    }

    .page-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .page-header .badge {
      display: inline-block;
      background: #F5C518;
      color: #111;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: .75rem;
    }
    .page-header h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      color: #1E6FFF;
      line-height: 1.2;
    }
    .page-header p {
      margin-top: .5rem;
      color: #555;
      font-size: .97rem;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 30px rgba(30,111,255,.08);
      padding: 2.2rem 2rem;
      max-width: 720px;
      margin: 0 auto 2.5rem;
    }

    .section-title {
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #1E6FFF;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e8eeff;
    }

    .form-grid {
      display: grid;
      gap: 1.2rem;
    }
    .form-grid.two-col {
      grid-template-columns: 1fr 1fr;
    }
    @media (max-width: 560px) {
      .form-grid.two-col { grid-template-columns: 1fr; }
      .card { padding: 1.5rem 1.2rem; }
    }

    label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: #333;
      margin-bottom: .4rem;
    }
    label span.req { color: #1E6FFF; }

    input[type="text"],
    input[type="date"],
    textarea,
    select {
      width: 100%;
      padding: .65rem .9rem;
      border: 1.5px solid #dde4ff;
      border-radius: 10px;
      font-size: .95rem;
      font-family: inherit;
      color: #111;
      background: #fafbff;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    input:focus, textarea:focus, select:focus {
      border-color: #1E6FFF;
      box-shadow: 0 0 0 3px rgba(30,111,255,.12);
      background: #fff;
    }
    textarea { resize: vertical; min-height: 90px; }

    .radio-group, .check-group {
      display: flex;
      flex-wrap: wrap;
      gap: .6rem;
    }
    .radio-group label, .check-group label {
      margin: 0;
      cursor: pointer;
    }
    .radio-group input[type="radio"],
    .check-group input[type="checkbox"] {
      display: none;
    }
    .radio-group label span,
    .check-group label span {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      padding: .5rem 1rem;
      border-radius: 30px;
      border: 1.5px solid #dde4ff;
      font-size: .87rem;
      font-weight: 500;
      background: #fafbff;
      color: #444;
      transition: all .18s;
      user-select: none;
    }
    .radio-group input[type="radio"]:checked + span,
    .check-group input[type="checkbox"]:checked + span {
      background: #1E6FFF;
      border-color: #1E6FFF;
      color: #fff;
    }
    .radio-group label:hover span,
    .check-group label:hover span {
      border-color: #1E6FFF;
      color: #1E6FFF;
    }
    .radio-group input[type="radio"]:checked + span:hover,
    .check-group input[type="checkbox"]:checked + span:hover {
      color: #fff;
    }

    .hint { font-size: .78rem; color: #888; margin-top: .3rem; }

    .btn-generate {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      width: 100%;
      padding: .9rem 1.5rem;
      background: #1E6FFF;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: .5rem;
      transition: background .2s, transform .1s, box-shadow .2s;
      box-shadow: 0 4px 18px rgba(30,111,255,.3);
    }
    .btn-generate:hover { background: #1558d9; box-shadow: 0 6px 22px rgba(30,111,255,.38); }
    .btn-generate:active { transform: scale(.98); }
    .btn-generate:disabled { background: #a0b8ff; box-shadow: none; cursor: not-allowed; }

    .spinner {
      width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results ── */
    #results { max-width: 720px; margin: 0 auto; }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.8rem;
    }
    .results-header h2 {
      font-size: 1.45rem;
      font-weight: 800;
      color: #111;
    }
    .results-header h2 span { color: #1E6FFF; }

    .btn-copy-all {
      display: flex;
      align-items: center;
      gap: .4rem;
      padding: .55rem 1.1rem;
      background: #F5C518;
      color: #111;
      border: none;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .18s;
    }
    .btn-copy-all:hover { background: #e0b10f; }

    .week-block {
      margin-bottom: 2rem;
    }
    .week-title {
      font-size: 1rem;
      font-weight: 800;
      color: #1E6FFF;
      background: #eef3ff;
      border-left: 4px solid #1E6FFF;
      padding: .55rem 1rem;
      border-radius: 0 8px 8px 0;
      margin-bottom: 1rem;
    }

    .post-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 16px rgba(30,111,255,.07);
      border: 1px solid #e8eeff;
      margin-bottom: 1rem;
      overflow: hidden;
    }
    .post-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .8rem 1.1rem;
      background: #f4f7ff;
      border-bottom: 1px solid #e8eeff;
    }
    .post-meta {
      display: flex;
      align-items: center;
      gap: .6rem;
      flex-wrap: wrap;
    }
    .tag {
      display: inline-block;
      font-size: .72rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .tag-reel { background: #ffe8f0; color: #c0185a; }
    .tag-carousel { background: #fff3cd; color: #7a5c00; }
    .tag-day { background: #e8eeff; color: #1E6FFF; }

    .post-body { padding: 1rem 1.1rem; }

    .content-section { margin-bottom: 1rem; }
    .content-label {
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #888;
      margin-bottom: .4rem;
    }
    .content-text {
      font-size: .9rem;
      line-height: 1.6;
      color: #222;
      white-space: pre-wrap;
      background: #f8f9ff;
      border-radius: 8px;
      padding: .7rem .9rem;
    }

    .slides-list { display: flex; flex-direction: column; gap: .5rem; }
    .slide-item {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: .5rem;
      align-items: start;
      background: #f8f9ff;
      border-radius: 8px;
      padding: .6rem .8rem;
    }
    .slide-num {
      width: 28px; height: 28px;
      background: #1E6FFF;
      color: #fff;
      border-radius: 50%;
      font-size: .72rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .slide-text { font-size: .88rem; line-height: 1.55; color: #222; }

    .caption-box {
      background: #fffbea;
      border: 1.5px solid #F5C518;
      border-radius: 10px;
      padding: .75rem .9rem;
      font-size: .9rem;
      line-height: 1.65;
      color: #222;
      white-space: pre-wrap;
    }

    .btn-copy-caption {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      padding: .38rem .85rem;
      background: #F5C518;
      color: #111;
      border: none;
      border-radius: 6px;
      font-size: .78rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .18s;
    }
    .btn-copy-caption:hover { background: #e0b10f; }
    .btn-copy-caption.copied { background: #22c55e; color: #fff; }

    .caption-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-top: .5rem;
    }

    .error-box {
      background: #fff0f0;
      border: 1.5px solid #fca5a5;
      border-radius: 12px;
      padding: 1.2rem 1.4rem;
      color: #b91c1c;
      font-size: .93rem;
      display: flex;
      gap: .7rem;
      align-items: flex-start;
    }
    .error-box svg { flex-shrink: 0; margin-top: 2px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="page-header">
  <div class="badge">Club Geek</div>
  <h1>Planificador de Lanzamiento</h1>
  <p>Genera tu plan de contenido semana a semana con IA</p>
</div>

<!-- FORMULARIO -->
<div class="card" id="form-card">
  <form id="launch-form" novalidate>

    <div class="section-title">Sobre tu producto</div>
    <div class="form-grid">
      <div>
        <label>Nombre del producto o servicio <span class="req">*</span></label>
        <input type="text" name="producto" placeholder="Ej: Curso de fotografía para principiantes" required />
      </div>
      <div>
        <label>Descripción breve <span class="req">*</span></label>
        <textarea name="descripcion" placeholder="Qué es y para quién es. Ej: Un curso online de 4 semanas para personas sin experiencia que quieren aprender a tomar fotos profesionales con su celular." required></textarea>
      </div>
    </div>

    <div class="section-title" style="margin-top:1.8rem">Fechas y preventa</div>
    <div class="form-grid two-col">
      <div>
        <label>Fecha de lanzamiento <span class="req">*</span></label>
        <input type="date" name="fecha_lanzamiento" required />
      </div>
      <div>
        <label>Semanas de preventa <span class="req">*</span></label>
        <div class="radio-group" style="margin-top:.15rem">
          <label><input type="radio" name="semanas_preventa" value="1" required /><span>1 semana</span></label>
          <label><input type="radio" name="semanas_preventa" value="2" /><span>2 semanas</span></label>
          <label><input type="radio" name="semanas_preventa" value="3" /><span>3 semanas</span></label>
          <label><input type="radio" name="semanas_preventa" value="4" /><span>4 semanas</span></label>
        </div>
      </div>
    </div>

    <div class="section-title" style="margin-top:1.8rem">Redes sociales</div>
    <div class="form-grid two-col">
      <div>
        <label>Red social principal <span class="req">*</span></label>
        <div class="radio-group" style="margin-top:.15rem">
          <label><input type="radio" name="red_social" value="Instagram" required /><span>📸 Instagram</span></label>
          <label><input type="radio" name="red_social" value="TikTok" /><span>🎵 TikTok</span></label>
          <label><input type="radio" name="red_social" value="Facebook" /><span>👥 Facebook</span></label>
        </div>
      </div>
      <div>
        <label>Posts por semana <span class="req">*</span></label>
        <div class="radio-group" style="margin-top:.15rem">
          <label><input type="radio" name="frecuencia" value="2" required /><span>2</span></label>
          <label><input type="radio" name="frecuencia" value="3" /><span>3</span></label>
          <label><input type="radio" name="frecuencia" value="4" /><span>4</span></label>
          <label><input type="radio" name="frecuencia" value="5" /><span>5</span></label>
        </div>
      </div>
    </div>

    <div class="form-grid two-col" style="margin-top:1.2rem">
      <div>
        <label>Tipo de contenido <span class="req">*</span></label>
        <div class="radio-group" style="margin-top:.15rem">
          <label><input type="radio" name="tipo_contenido" value="Solo Reels" required /><span>🎬 Solo Reels</span></label>
          <label><input type="radio" name="tipo_contenido" value="Solo Carruseles" /><span>🖼️ Solo Carruseles</span></label>
          <label><input type="radio" name="tipo_contenido" value="Reels y Carruseles" /><span>🎬🖼️ Mix</span></label>
        </div>
      </div>
      <div>
        <label>Tono de comunicación <span class="req">*</span></label>
        <div class="radio-group" style="margin-top:.15rem">
          <label><input type="radio" name="tono" value="Empoderador" required /><span>💪 Empoderador</span></label>
          <label><input type="radio" name="tono" value="Cercano" /><span>🤗 Cercano</span></label>
          <label><input type="radio" name="tono" value="Urgente" /><span>⚡ Urgente</span></label>
          <label><input type="radio" name="tono" value="Educativo" /><span>📚 Educativo</span></label>
        </div>
      </div>
    </div>

    <div id="form-error" class="error-box hidden" style="margin-top:1.2rem">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="form-error-text">Por favor completa todos los campos.</span>
    </div>

    <button type="submit" class="btn-generate" id="btn-generate" style="margin-top:1.8rem">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      Generar plan de lanzamiento
    </button>

  </form>
</div>

<!-- RESULTADOS -->
<div id="results" class="hidden">
  <div class="results-header">
    <h2>Tu plan de <span>lanzamiento</span></h2>
    <button class="btn-copy-all" id="btn-copy-all">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      Copiar plan completo
    </button>
  </div>
  <div id="results-body"></div>
</div>

<script>
const form = document.getElementById('launch-form');
const btnGenerate = document.getElementById('btn-generate');
const resultsSection = document.getElementById('results');
const resultsBody = document.getElementById('results-body');
const formError = document.getElementById('form-error');
const formErrorText = document.getElementById('form-error-text');

function getFormData() {
  const fd = new FormData(form);
  return {
    producto: fd.get('producto')?.trim(),
    descripcion: fd.get('descripcion')?.trim(),
    fecha_lanzamiento: fd.get('fecha_lanzamiento'),
    semanas_preventa: fd.get('semanas_preventa'),
    red_social: fd.get('red_social'),
    frecuencia: fd.get('frecuencia'),
    tipo_contenido: fd.get('tipo_contenido'),
    tono: fd.get('tono'),
  };
}

function validateData(d) {
  if (!d.producto) return 'Escribe el nombre del producto o servicio.';
  if (!d.descripcion) return 'Escribe una descripción breve.';
  if (!d.fecha_lanzamiento) return 'Selecciona la fecha de lanzamiento.';
  if (!d.semanas_preventa) return 'Elige cuántas semanas de preventa.';
  if (!d.red_social) return 'Elige la red social principal.';
  if (!d.frecuencia) return 'Elige la frecuencia de posts por semana.';
  if (!d.tipo_contenido) return 'Elige el tipo de contenido.';
  if (!d.tono) return 'Elige el tono de comunicación.';
  return null;
}

function setLoading(on) {
  btnGenerate.disabled = on;
  btnGenerate.innerHTML = on
    ? `<div class="spinner"></div> Generando tu plan...`
    : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Generar plan de lanzamiento`;
}

function copyText(text, btn, label = 'Copiar') {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copiado';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = label;
      btn.classList.remove('copied');
    }, 2000);
  });
}

function buildPostCard(post, idx) {
  const typeTag = post.tipo === 'Reel'
    ? `<span class="tag tag-reel">🎬 Reel</span>`
    : `<span class="tag tag-carousel">🖼️ Carrusel</span>`;
  const dayTag = post.dia ? `<span class="tag tag-day">${post.dia}</span>` : '';

  let contentHtml = '';
  if (post.tipo === 'Reel') {
    const partes = [
      { label: '🎣 Hook', val: post.hook },
      { label: '😣 Problema', val: post.problema },
      { label: '✅ Solución', val: post.solucion },
      { label: '📣 CTA', val: post.cta },
    ];
    const partesHtml = partes.map(p => p.val ? `
      <div class="content-section">
        <div class="content-label">${p.label}</div>
        <div class="content-text">${escHtml(p.val)}</div>
      </div>` : '').join('');
    const guionHtml = post.guion ? `
      <div class="content-section">
        <div class="content-label">🎬 Guión completo</div>
        <div class="content-text">${escHtml(post.guion)}</div>
      </div>` : '';
    contentHtml = partesHtml + guionHtml;
  } else {
    const allSlides = [post.portada, ...(Array.isArray(post.slides) ? post.slides : [])].filter(Boolean);
    const slidesHtml = allSlides.map((s, i) => `
      <div class="slide-item">
        <div class="slide-num">${i + 1}</div>
        <div class="slide-text">${escHtml(s)}</div>
      </div>`).join('');
    contentHtml = `
      <div class="content-section">
        <div class="content-label">Slides del carrusel</div>
        <div class="slides-list">${slidesHtml}</div>
      </div>`;
  }

  const captionId = `caption-${idx}`;
  return `
    <div class="post-card">
      <div class="post-header">
        <div class="post-meta">
          ${typeTag}
          ${dayTag}
          ${post.objetivo ? `<span style="font-size:.8rem;color:#666">${escHtml(post.objetivo)}</span>` : ''}
        </div>
      </div>
      <div class="post-body">
        ${contentHtml}
        <div class="content-section">
          <div class="content-label">Caption</div>
          <div class="caption-box" id="${captionId}">${escHtml(post.caption || '')}</div>
          <div class="caption-footer">
            <button class="btn-copy-caption" onclick="copyCaption('${captionId}', this)">
              📋 Copiar caption
            </button>
          </div>
        </div>
      </div>
    </div>`;
}

function copyCaption(id, btn) {
  const text = document.getElementById(id)?.textContent || '';
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.innerHTML;
    btn.textContent = '✓ Copiado';
    btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 2000);
  });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderResults(data) {
  const semanas = Array.isArray(data.semanas) ? data.semanas : [];
  if (!semanas.length) {
    resultsBody.innerHTML = `<div class="error-box">No se recibió contenido. Intenta de nuevo.</div>`;
    return;
  }

  let html = '';
  let fullText = `PLAN DE LANZAMIENTO: ${data.producto || ''}\n${'='.repeat(50)}\n\n`;

  semanas.forEach((semana, si) => {
    const posts = Array.isArray(semana.posts) ? semana.posts : [];
    html += `<div class="week-block">
      <div class="week-title">Semana ${semana.numero || si + 1} — ${escHtml(semana.objetivo || '')}</div>`;

    fullText += `SEMANA ${semana.numero || si + 1}: ${semana.objetivo || ''}\n${'-'.repeat(40)}\n`;

    posts.forEach((post, pi) => {
      html += buildPostCard(post, `s${si}p${pi}`);
      if (post.tipo === 'Reel') {
        fullText += `\nPOST ${pi + 1} (Reel) ${post.dia || ''}\nHook: ${post.hook || ''}\nProblema: ${post.problema || ''}\nSolución: ${post.solucion || ''}\nCTA: ${post.cta || ''}\nGuión:\n${post.guion || ''}\n`;
      } else {
        const allSlides = [post.portada, ...(Array.isArray(post.slides) ? post.slides : [])].filter(Boolean);
        fullText += `\nPOST ${pi + 1} (Carrusel) ${post.dia || ''}\nSlides:\n${allSlides.map((s,i)=>`${i+1}. ${s}`).join('\n')}\n`;
      }
      fullText += `Caption:\n${post.caption || ''}\n\n`;
    });

    html += `</div>`;
    fullText += '\n';
  });

  resultsBody.innerHTML = html;

  document.getElementById('btn-copy-all').onclick = () => {
    const btn = document.getElementById('btn-copy-all');
    navigator.clipboard.writeText(fullText).then(() => {
      btn.textContent = '✓ Plan copiado';
      setTimeout(() => { btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copiar plan completo`; }, 2500);
    });
  };
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  formError.classList.add('hidden');

  const data = getFormData();
  const err = validateData(data);
  if (err) {
    formErrorText.textContent = err;
    formError.classList.remove('hidden');
    formError.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  setLoading(true);
  resultsSection.classList.add('hidden');

  try {
    const res = await fetch('/api/generar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });

    if (!res.ok) {
      const msg = await res.text();
      throw new Error(msg || `Error ${res.status}`);
    }

    const json = await res.json();
    renderResults({ ...json, producto: data.producto });
    resultsSection.classList.remove('hidden');
    resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (err) {
    formErrorText.textContent = `Error al generar el plan: ${err.message}`;
    formError.classList.remove('hidden');
    formError.scrollIntoView({ behavior: 'smooth', block: 'center' });
  } finally {
    setLoading(false);
  }
});
</script>
</body>
</html>
